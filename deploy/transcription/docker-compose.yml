# =============================================================================
# Transcription service — SEPARATE GPU deploy unit (NOT part of `make all`).
# =============================================================================
# The GPU workload is carved out: stand this up on a GPU host, then point the main
# stack at it via TRANSCRIPTION_SERVICE_URL (base URL — the client appends
# /v1/audio/transcriptions). See README.md.
#
#   docker compose up -d            # GPU (this file)
#   docker compose -f docker-compose.cpu.yml up -d   # CPU-only (no GPU)
#
# Build context is the carve root (../..) so the worker image is built from the
# core/meetings/services/transcription brick.
services:
  # Nginx load balancer — the single front door (least-conn across workers).
  transcription-api:
    image: nginx:alpine
    ports:
      - "${TRANSCRIPTION_LB_PORT:-8083}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transcription-worker-1
    restart: unless-stopped
    networks: [transcription-net]

  # Worker 1 (GPU). Scale out by uncommenting worker-2/3 here AND in nginx.conf.
  transcription-worker-1:
    build:
      context: ../..
      dockerfile: core/meetings/services/transcription/Dockerfile
    image: vexaai/v012-transcription:${IMAGE_TAG:-dev}
    environment:
      - WORKER_ID=1
      - MODEL_SIZE=${MODEL_SIZE:-large-v3-turbo}
      - DEVICE=cuda
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - API_TOKEN=${API_TOKEN:-}
      - VAD_MIN_SILENCE_DURATION_MS=${VAD_MIN_SILENCE_DURATION_MS:-80}
    volumes:
      - transcription-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks: [transcription-net]

  # # Worker 2 (GPU) — uncomment + add to nginx.conf upstream (needs a second GPU).
  # transcription-worker-2:
  #   build:
  #     context: ../..
  #     dockerfile: core/meetings/services/transcription/Dockerfile
  #   image: vexaai/v012-transcription:${IMAGE_TAG:-dev}
  #   environment:
  #     - WORKER_ID=2
  #     - MODEL_SIZE=${MODEL_SIZE:-large-v3-turbo}
  #     - DEVICE=cuda
  #     - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
  #     - API_TOKEN=${API_TOKEN:-}
  #   volumes:
  #     - transcription-models:/app/models
  #   deploy:
  #     resources: { reservations: { devices: [{ driver: nvidia, count: 1, capabilities: [gpu] }] } }
  #   restart: unless-stopped
  #   networks: [transcription-net]

networks:
  transcription-net:
    driver: bridge

volumes:
  # downloaded model weights — a named volume, so weights never land in the working tree
  transcription-models:
