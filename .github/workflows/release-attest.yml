name: release-attest
# On every published release: build the canonical source archive, attest its build provenance
# (GitHub Artifact Attestations → SLSA provenance v1, verifiable with `gh attestation verify`),
# and attach the attested archive to the release. This backs the SLSA attestation entry in
# security-insights.yml (OSPS-BR-06).
on:
  release:
    types: [published]

permissions:
  contents: write      # upload the archive to the release
  id-token: write      # OIDC identity for provenance signing
  attestations: write  # persist the attestation

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the canonical source archive
        run: git archive --format=tar.gz --prefix="vexa-core-${GITHUB_REF_NAME}/" -o "vexa-core-${GITHUB_REF_NAME}.tar.gz" "$GITHUB_REF_NAME"
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: vexa-core-${{ github.ref_name }}.tar.gz
      - name: Attach the attested archive to the release
        run: gh release upload "$GITHUB_REF_NAME" "vexa-core-${GITHUB_REF_NAME}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
