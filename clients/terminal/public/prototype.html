<html lang="en">

<title>Vexa EI — knowledge-worker terminal</title>
<style>
  :root{

  *{box-sizing:border-box}

  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:6px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.16)}

  .topbar{height:38px;display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:1px solid var(--line);background:var(--sidebar);position:relative;z-index:5}

  .screen{height:calc(100% - 38px);overflow-y:auto;background:var(--bg)}

  .item .dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex:none} .item small{margin-left:auto;color:var(--t3);font-size:11px}
  .tree .l2{padding-left:24px} .tree .l3{padding-left:38px}

  .chip.live{color:var(--live);border-color:transparent;background:var(--livebg)} .chip.on{color:var(--green);border-color:transparent;background:var(--greenbg)}
  .seg{display:inline-flex;gap:3px;background:var(--panel2);border-radius:8px;padding:3px}
  .seg button{border:none;background:none;padding:4px 12px;border-radius:6px;font-size:12px;color:var(--t2);cursor:pointer} .seg button.sel{background:var(--bg);color:var(--t1)}
  .body{flex:1;overflow-y:auto;min-height:0} .wrap{max-width:760px;margin:0 auto;padding:22px 24px 30px}

  .msg{display:flex;gap:11px;margin-bottom:18px} .msg .av{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px}
  .av.bot{background:var(--accentbg);color:var(--accent)} .av.me{background:var(--bluebg);color:var(--blue)} .msg.me{justify-content:flex-end}
  .bubble{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 13px;max-width:80%} .msg.me .bubble{background:var(--panel2);border-color:transparent}
  .bubble p{margin:0 0 6px} .bubble p:last-child{margin:0}
  .tools{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px} .tool{font-size:11px;color:var(--t3);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 7px;display:inline-flex;gap:5px;align-items:center}
  .commit{font-size:11.5px;color:var(--green);display:inline-flex;gap:6px;align-items:center;margin-top:8px}
  .wl{color:var(--blue);cursor:pointer;border-bottom:1px dotted rgba(110,168,254,.5)} .wl:hover{border-bottom-style:solid}

  .pcard{border:1px solid var(--line2);border-radius:12px;padding:11px 13px;margin-bottom:14px;max-width:88%}
  .pcard.green{background:var(--greenbg);border-color:rgba(72,183,135,.35)} .pcard.blue{background:var(--bluebg);border-color:rgba(110,168,254,.35)} .pcard.violet{background:var(--violetbg);border-color:rgba(176,140,240,.35)}
  .pcard .ph{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:500}
  .pcard.green .ph{color:var(--green)} .pcard.blue .ph{color:var(--blue)} .pcard.violet .ph{color:var(--violet)}
  .pcard .pb{font-size:13.5px;color:var(--t1);margin:6px 0 0}
  .pacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .pbtn{font-size:12px;border-radius:7px;padding:5px 11px;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--t1)} .pbtn:hover{background:var(--panel2)}
  .pbtn.primary{background:#fff;color:#111;border-color:#fff} .pbtn.ghost{background:none;border-color:transparent;color:var(--t3)}

  .composer{flex:none;border-top:1px solid var(--line);padding:12px 24px 16px} .composer .inner{max-width:760px;margin:0 auto;position:relative}
  .qchips{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
  .cmds{border:1px solid var(--line2);border-radius:11px;background:var(--panel);margin-bottom:9px;overflow:hidden}
  .cmd{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)} .cmd:last-child{border-bottom:none} .cmd:hover{background:var(--panel2)}
  .cmd code{font-family:var(--mono);color:var(--accent);font-size:12.5px;min-width:88px} .cmd span{color:var(--t3);font-size:12px}
  .cbox{border:1px solid var(--line2);border-radius:12px;background:var(--panel);padding:11px 12px;display:flex;align-items:center;gap:11px}
  .cbox .slash{font-family:var(--mono);color:var(--t3);font-size:13px}
  .cbox input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:14px} .cbox input::placeholder{color:var(--t3)}
  .cbox .cic{color:var(--t3);cursor:pointer;display:flex}
  .cbox .send{background:var(--accent);color:#241008;border:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}

  aside.right{background:var(--rail);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0;min-width:0}
  .rhead{height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12.5px;color:var(--t2);flex:none} .rhead .x{margin-left:auto;color:var(--t3);cursor:pointer;display:flex}
  .rbody{flex:1;overflow-y:auto;padding:14px;min-height:0}
  .tx{margin-bottom:13px;font-size:12.5px} .tx .who{font-weight:500} .tx .who.a{color:var(--blue)} .tx .who.b{color:var(--green)} .tx .ti{color:var(--t3);font-size:11px;margin-left:6px} .tx .tt{color:var(--t2);margin-top:2px}
  .doc h3{font-size:15px;margin:0 0 4px;font-weight:500} .doc .kv{font-size:12px;color:var(--t3);margin-bottom:2px}
  .doc h4{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 5px} .doc p{margin:0 0 5px;font-size:13px;color:var(--t1)}
  .doc .restricted{font-size:11.5px;color:var(--violet);background:var(--violetbg);border-radius:7px;padding:6px 9px;display:flex;gap:7px;align-items:center;margin-bottom:10px}

  .list{display:flex;flex-direction:column}

  .mail .un{width:7px;height:7px;border-radius:50%;background:var(--blue);margin-top:6px;flex:none} .mail.read .un{background:transparent}
  .mail .av{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
  .mail .mc{min-width:0;flex:1} .mail .mr{display:flex;gap:8px;align-items:baseline}
  .mail .from{font-weight:500;font-size:13.5px} .mail .time{margin-left:auto;color:var(--t3);font-size:11.5px;flex:none}

  .mtag{font-size:10.5px;border-radius:5px;padding:1px 6px;margin-top:5px;display:inline-flex;align-items:center;gap:4px} .mtag.imp{color:var(--accent);background:var(--accentbg)} .mtag.low{color:var(--t3);background:var(--panel2)}

  .cal{padding:14px 18px} .slot{display:grid;grid-template-columns:54px 1fr;gap:10px;min-height:44px} .slot .tm{font-size:11px;color:var(--t3);text-align:right;padding-top:2px} .slot .ln{border-top:1px solid var(--line)}
  .ev{border-radius:8px;padding:7px 10px;margin:3px 0;cursor:pointer;border-left:3px solid var(--blue);background:var(--bluebg)} .ev:hover{filter:brightness(1.15)}

  .ev b{font-size:13px;font-weight:500;display:block} .ev span{font-size:11.5px;color:var(--t2)}
  .daygrp{padding:14px 18px 5px;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}

  .card{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px 16px}
  .card .ch{display:flex;align-items:center;gap:11px} .card h3{font-size:14px;font-weight:500;margin:0}
  .card .cmeta{display:flex;gap:16px;margin-top:11px;font-size:12px;color:var(--t3);flex-wrap:wrap} .card .cmeta b{color:var(--t2);font-weight:400}

  .toast{position:fixed;bottom:20px;right:20px;background:var(--panel2);border:1px solid var(--line2);color:var(--t1);padding:11px 14px;border-radius:10px;font-size:13px;display:flex;gap:9px;align-items:center;opacity:0;transform:translateY(8px);transition:.2s;z-index:50}
  .toast.show{opacity:1;transform:none} .toast .ok{color:var(--green);display:flex}
</style>
</head>

function routineTog(r){return `<div class="togrow"><div class="ti" style="color:var(--${r.tk==='time'?'blue':'violet'})">${ic(r.tk==='time'?'clock':'bolt')}</div><div class="tc"><b>${r.name}</b><div class="flow" style="margin:3px 0"><span class="pill ${r.tk}">${r.trig}</span><span class="ic14" style="display:flex;color:var(--t3)">${ic('arrow')}</span><span class="pill plan">plan</span></div><span>${r.plan}</span></div><div class="sw ${r.on?'on':''}" data-toggle="routine" data-id="${r.id}"></div></div>`;}
function stepContent(){
  const s=V.setup;
  if(state.step===0) return {h:'Connect your tools',sub:`The terminal works over what you already use. ${s.tagline}.`,body:s.integrations.map((x,i)=>`<div class="togrow"><div class="ti">${ic(x.i)}</div><div class="tc"><b>${x.n}</b><span>${x.d}</span></div>${x.req?'<span class="req">required</span>':''}<div class="sw ${x.on?'on':''}" data-toggle="int" data-id="${i}"></div></div>`).join('')};
  if(state.step===1) return {h:'Your knowledge graph',sub:'Entity types wired with templates and wikilinks. The agent grows them from meetings, email, and news.',body:`<div class="etags">${s.entities.map(e=>`<span class="etag"><span class="ic14" style="display:flex;color:var(--t2)">${ic('file')}</span>${e}</span>`).join('')}</div><div class="note"><span class="ic16" style="display:flex;color:var(--t3)">${ic('database')}</span>Git-backed markdown. Every fact is dated, confidence-scored, and cites its source.</div>`};
  if(state.step===2) return {h:'Routines',sub:'Each routine is a trigger → plan. Time-triggered or event-triggered. Create more later from chat with /routine.',body:V.routines.map(routineTog).join('')};
  if(state.step===3) return {h:'Governance & compliance',sub:'The controls this template enforces — on by default for your industry.',body:s.compliance.map((c,i)=>`<div class="togrow"><div class="ti" style="color:var(--${c.on?'green':'t2'})">${ic(c.i)}</div><div class="tc"><b>${c.n}</b><span>${c.d}</span></div><div class="sw ${c.on?'on':''}" data-toggle="comp" data-id="${i}"></div></div>`).join('')};
  if(state.step===4){const selfhost=state.deployModel!=='cloud';return {h:'Deployment',sub:'Where the terminal runs. For full self-hosting, everything — meeting bots, agentic runtime, inference, storage, identity — lives in your infrastructure.',body:`${DEPLOY_MODELS.map(m=>`<div class="togrow selrow ${state.deployModel===m.key?'sel':''}" data-deploy="${m.key}"><div class="ti">${ic(m.icon)}</div><div class="tc"><b>${m.name}</b><span>${m.sub}</span></div>${state.deployModel===m.key?`<span class="ic16" style="display:flex;color:var(--accent)">${ic('check')}</span>`:''}</div>`).join('')}<div class="note" style="margin:6px 0 16px"><span class="ic16" style="display:flex;color:var(--${selfhost?'green':'t3'})">${ic(selfhost?'shield':'database')}</span>${egressLine[state.deployModel]}</div><div class="sub" style="margin:0 0 10px">${selfhost?'Runs in your infrastructure':'Managed by Vexa'}</div>${DEPLOY_COMP.map(c=>`<div class="togrow"><div class="ti" style="color:var(--${selfhost?'green':'t2'})">${ic(c.i)}</div><div class="tc"><b>${c.n}</b><span>${c.d}</span></div><span class="ic16" style="display:flex;color:var(--${selfhost?'green':'t3'})">${ic(selfhost?'check':'database')}</span></div>`).join('')}`};}
  const on=a=>a.filter(x=>x.on).length;

let currentQuick=[];
function renderChips(val){
  const menu=document.getElementById('cmdmenu'),chips=document.getElementById('qchips');
  if(val.startsWith('/')){chips.innerHTML='';const q=val.slice(1).toLowerCase();const matches=SKILLS.filter(s=>s.c.slice(1).startsWith(q));menu.innerHTML=`<div class="cmds">${matches.map(s=>`<div class="cmd" data-cmd="${s.c}"><code>${s.c}</code><span>${s.d}</span></div>`).join('')||'<div class="cmd"><span>No matching skill</span></div>'}</div>`;}
  else{menu.innerHTML='';chips.innerHTML=currentQuick.map(q=>`<button class="chip" data-q="${q}">${q.startsWith('/')?`<span style="font-family:var(--mono);color:var(--accent)">${q}</span>`:q}</button>`).join('');}
}
function render(){
  const onApp=state.screen==='app';
  document.getElementById('app').style.display=onApp?'grid':'none';
  document.getElementById('screen').style.display=onApp?'none':'block';
  if(onApp){renderApp();return;}
  if(state.screen==='landing'){document.getElementById('tbTitle').textContent='Set up your workspace';document.getElementById('tbBadge').textContent='Vexa EI';renderLanding();}
  else{document.getElementById('tbTitle').textContent='Workspace setup';document.getElementById('tbBadge').textContent=V?V.badge:'Vexa EI';renderSetup();}
}
function startSetup(key){V=VERTICALS[key];state.vertical=key;state.mail=V.mails[0].id;state.step=0;state.deployModel=['dtcc','ms','citi'].includes(key)?'airgap':'vpc';state.screen='setup';render();}
function saveRoutine(tk,name){V.routines.unshift({id:'rx'+V.routines.length,name,tk,trig:tk==='time'?'Daily · 18:00':'On meeting end',plan:'Created from chat — update the file and draft the follow-up.',last:'—',next:tk==='time'?'today 18:00':'on next trigger',runs:0,on:true});state.view='routines';toast('Routine created · '+name);render();}

document.addEventListener('click',e=>{
  const ind=e.target.closest('[data-ind]');if(ind){const k=ind.dataset.ind;if(k==='finance'){state.industry='finance';render();}else{startSetup(k);}return;}
  const firm=e.target.closest('[data-firm]');if(firm){startSetup(firm.dataset.firm);return;}
  if(e.target.closest('[data-backind]')){state.industry=null;render();return;}
  if(e.target.closest('[data-backsetup]')){state.screen='landing';state.industry=['dtcc','ms','citi'].includes(state.vertical)?'finance':null;render();return;}
  const sp=e.target.closest('[data-step]');if(sp){const i=+sp.dataset.step;if(i<=state.step){state.step=i;render();}return;}
  if(e.target.closest('[data-continue]')){state.step=Math.min(STEPS.length-1,state.step+1);render();return;}
  if(e.target.closest('[data-back]')){state.step=Math.max(0,state.step-1);render();return;}
  if(e.target.closest('[data-launch]')){state.screen='app';state.view='live';toast('Terminal ready · '+V.brand.org);render();return;}

  const tog=e.target.closest('[data-toggle]');if(tog){const ty=tog.dataset.toggle,id=tog.dataset.id;if(ty==='int')V.setup.integrations[+id].on=!V.setup.integrations[+id].on;else if(ty==='comp')V.setup.compliance[+id].on=!V.setup.compliance[+id].on;else if(ty==='routine'){const o=V.routines.find(x=>x.id===id);o.on=!o.on;toast((o.on?'Enabled':'Paused')+' · '+o.name);}render();return;}
  const dep=e.target.closest('[data-deploy]');if(dep){state.deployModel=dep.dataset.deploy;render();return;}

  if(state.screen!=='app')return;
  const sr=e.target.closest('[data-saveroutine]');if(sr){saveRoutine(sr.dataset.saveroutine,sr.dataset.name);return;}
  const cmd=e.target.closest('[data-cmd]');if(cmd){const i=document.getElementById('cinput');i.value=cmd.dataset.cmd+' ';renderChips(i.value);i.focus();return;}
  const nav=e.target.closest('[data-nav]');if(nav){state.view=nav.dataset.nav;if(state.view==='calendar')state.meeting=null;render();return;}
  if(e.target.closest('#brand')){state.screen='landing';state.industry=['dtcc','ms','citi'].includes(state.vertical)?'finance':null;render();return;}
  const cm=e.target.closest('[data-calmode]');if(cm){state.calMode=cm.dataset.calmode;state.meeting=null;render();return;}
  const mail=e.target.closest('[data-mail]');if(mail){state.mail=+mail.dataset.mail;V.mails.find(m=>m.id===state.mail).unread=false;render();return;}
  const tk=e.target.closest('[data-task]');if(tk){const t=V.tasks.find(x=>x.id===tk.dataset.task);t.done=!t.done;toast(t.done?'Task done · '+t.t:'Reopened');render();return;}
  const q=e.target.closest('[data-q]');if(q){const i=document.getElementById('cinput');i.value=q.dataset.q;renderChips(i.value);i.focus();return;}
  const ev=e.target.closest('[data-ev]');if(ev){const t=ev.dataset.ev;const found=V.events.find(x=>x.title===t);if(found&&found.status==='live'){state.view='live';state.meeting=null;render();}else if(found&&found.status==='recorded'){state.meeting=t;render();}else{toast('Upcoming: '+t);}return;}
  const act=e.target.closest('[data-act]');if(act){toast(act.dataset.act);return;}
  if(e.target.closest('#railX')){railOpen=false;render();return;}
  if(e.target.closest('#railToggle')){if(state.screen==='app'){railOpen=!railOpen;render();}return;}
});
document.getElementById('sendBtn').addEventListener('click',()=>{const i=document.getElementById('cinput');const val=i.value.trim();if(!val)return;if(val.startsWith('/routine')){saveRoutine('event','Custom routine from chat');i.value='';return;}toast('Sent to agent: '+val.slice(0,40));i.value='';renderChips('');});
document.getElementById('cinput').addEventListener('input',e=>renderChips(e.target.value));
document.getElementById('cinput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('sendBtn').click();});
let toastT;function toast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
paintIcons(document);render();
</script>
</body>
</html>
